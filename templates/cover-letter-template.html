<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<title>{{NAME}} - Cover Letter - {{COMPANY}}</title>
<style>
  /*
   * ============================================================
   *  SHIVAM SHARMA - COVER LETTER TEMPLATE (v8.1)
   * ============================================================
   *  Matches resume visual spec: pure black on white, Inter/IBM
   *  Plex Sans, Letter + 0.4in margins, one page hard limit.
   *
   *  CONTENT RULES:
   *    - Opening: 1-2 lines, name the role + company specifically.
   *    - Body: 2-3 short paragraphs (problem -> proof point -> close).
   *    - When referencing ESC work, use the public-facing brand
   *      "HometownHUB" (the customer-facing product Maya AI sits
   *      behind). Resume stays with "ESC Partners" only.
   *    - "Open to relocation" is FINE here (it's been removed from
   *      the resume).
   *    - NEVER use em-dash (-) in content. Use hyphen, comma,
   *      semicolon, or colon.
   *    - Closing paragraph MUST include three proof links:
   *      * SALL live:     https://ai-sales-assistant-frontend.onrender.com/
   *      * SALL walkthru: https://www.youtube.com/watch?v=eCkP7_ZI348
   *      * Portfolio:     https://shivamsportfolio.webflow.io/
   *      (GitHub is NOT on the resume header and is NOT required
   *      in the closing links; include only if explicitly relevant.)
   *    - Total length: <=350 words. One page, always.
   * ============================================================
   */

  @page { size: Letter; margin: 0.4in; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'Inter', 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.4;
    color: #000;
    background: #fff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    max-height: 10.2in;
    overflow: hidden;
  }

  .header { text-align: center; margin-bottom: 14px; }

  .header h1 {
    font-size: 20pt;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.15;
    margin-bottom: 4px;
  }

  .contact-row {
    font-size: 10.5pt;
    line-height: 1.3;
  }

  .contact-row a { color: #000; text-decoration: none; }
  .contact-sep { padding: 0 6px; }

  .date-line { font-size: 10.5pt; margin-bottom: 10px; }

  .recipient {
    font-size: 10.5pt;
    line-height: 1.4;
    margin-bottom: 12px;
  }

  .salutation { margin-bottom: 8px; font-size: 10.5pt; }

  .letter-body p {
    font-size: 10.5pt;
    line-height: 1.45;
    margin-bottom: 8px;
  }

  .letter-body a { color: #000; text-decoration: underline; }

  .signoff { margin-top: 10px; font-size: 10.5pt; }

  strong, b { font-weight: 600; }

  a { white-space: nowrap; color: #000; }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      <span class="contact-sep">|</span>
      <span>{{PHONE}}</span>
      <span class="contact-sep">|</span>
      <a href="{{LINKEDIN_URL}}">linkedin.com/in/shivamsharma-ai</a>
      <span class="contact-sep">|</span>
      <a href="{{PORTFOLIO_URL}}">shivam.website</a>
    </div>
  </div>

  <div class="date-line">{{DATE}}</div>

  <div class="recipient">
    {{HIRING_TEAM}}<br>
    {{COMPANY}}
  </div>

  <div class="salutation">{{SALUTATION}}</div>

  <div class="letter-body">
    {{LETTER_BODY}}

    <!-- CLOSING PARAGRAPH MUST INCLUDE THE THREE PROOF LINKS -->
    <p>{{CLOSING_WITH_LINKS}}</p>
  </div>

  <div class="signoff">
    Sincerely,<br>
    {{NAME}}
  </div>

</div>
</body>
</html>
