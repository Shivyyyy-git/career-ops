<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} - Resume</title>
<style>
  /*
   * ============================================================
   *  SHIVAM SHARMA - ONE-PAGE RESUME TEMPLATE (v9 - Calibri)
   * ============================================================
   *  Visual spec mirrors user's master resume at
   *  ~/Desktop/Resume (2026)/Shivam Sharma Resume.pdf.
   *
   *  HEADER (centered):
   *    - Name "SHIVAM SHARMA" all caps, 15pt, weight 700, letter-spacing 0.03em
   *    - Contact line centered with pipe separators:
   *        email | phone | linkedin.com/in/shivamsharma-ai | www.shivam.website
   *    - Links styled in Word blue (#0563c1) underlined
   *    - NO GitHub link in header (add to Projects section instead if relevant)
   *
   *  SECTIONS (fixed order, no Summary by default):
   *    1. PROFESSIONAL EXPERIENCE (3-5 roles)
   *    2. EDUCATION (Simon + McKinsey one-liner + UCL)
   *    3. PROJECTS (1-2 one-line entries, no dates/locations)
   *    4. SKILLS (Product Management first, then AI/Platform & Tools)
   *
   *  FORMATTING RULES:
   *    - Pure black (#000) on white. Links in Word blue.
   *    - Font: Calibri, Aptos, Segoe UI, Helvetica, Arial fallback.
   *    - Body 10pt, role titles 10.5pt bold, section headers 10.5pt uppercase bold.
   *    - Section headers: full-width 1px solid #000 bottom border, clear margin-top.
   *    - Bold the lead phrase of each bullet (first clause before comma) — draws the eye.
   *    - Metrics bold weight 700 inside bullet text.
   *    - Bullets: disc markers, 17px left padding.
   *    - Dates: use en-dash (–) NOT hyphen (-) and NOT em-dash (—).
   *    - Role block layout (two-line header):
   *        Line 1: role-title (bold, left)  date (bold, en-dash, right-aligned)
   *        Line 2: company-name (bold, left) location (bold, right-aligned)
   *    - ONE PAGE HARD LIMIT. Prefer tightening bullets or dropping a role over
   *      collapsing section spacing (user-layer rule: sections must be visually separated).
   *    - Every rendered line must have >= 4 words. Rewrite orphan tails.
   *    - City of Rochester project MUST credit "Simon Vision Consulting" engagement.
   *
   *  COVER LETTER (separate template):
   *    Matches this Calibri format. References "Hometown Hub" as public-facing ESC brand.
   * ============================================================
   */

  @page {
    size: Letter;
    margin: 0.4in 0.55in;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'Calibri', 'Aptos', 'Segoe UI', 'Helvetica', 'Arial', sans-serif;
    font-size: 10pt;
    line-height: 1.2;
    color: #000;
    background: #fff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0;
    /* Hard one-page clip: Letter 11in - 0.4in x 2 margins = 10.2in */
    max-height: 10.2in;
    overflow: hidden;
  }

  /* === HEADER (centered) === */
  .header {
    text-align: center;
    margin-bottom: 6px;
  }

  .header h1 {
    font-size: 15pt;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    line-height: 1.15;
    margin-bottom: 2px;
    color: #000;
  }

  .contact-row {
    font-size: 10pt;
    line-height: 1.3;
    color: #000;
  }

  .contact-row a {
    color: #0563c1;
    text-decoration: underline;
  }

  .contact-sep {
    padding: 0 3px;
  }

  /* === SECTION HEADERS === */
  .section { margin-top: 8px; }

  .section-title {
    font-size: 10.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    color: #000;
    border-bottom: 1px solid #000;
    padding-bottom: 2px;
    margin-bottom: 6px;
  }

  /* === SUMMARY === */
  .summary-text {
    font-size: 10.5pt;
    line-height: 1.25;
    color: #000;
  }

  /* === EXPERIENCE (two-line role header) === */
  .job { margin-bottom: 6px; }

  .role-header,
  .company-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .role-header { margin-bottom: 0; }
  .company-header { margin-bottom: 1px; }

  .role-title {
    font-size: 10.5pt;
    font-weight: 700;
    color: #000;
  }

  .company-name {
    font-size: 10pt;
    font-style: normal;
    font-weight: 700;
    color: #000;
  }

  .job-period {
    font-size: 10.5pt;
    font-weight: 700;
    color: #000;
    white-space: nowrap;
    text-align: right;
  }

  .job-location {
    font-size: 10pt;
    font-style: normal;
    font-weight: 700;
    color: #000;
    white-space: nowrap;
    text-align: right;
  }

  .job ul {
    list-style-type: disc;
    list-style-position: outside;
    padding-left: 17px;
    margin-top: 3px;
  }

  .job li {
    display: list-item;
    list-style-type: disc;
    font-size: 10pt;
    line-height: 1.22;
    color: #000;
    margin-bottom: 2px;
  }

  /* Bold lead phrase and metrics - weight 700 */
  .job li strong,
  .job li b,
  .job li .metric,
  .metric,
  .summary-text strong,
  .projects-list strong,
  .project-line strong,
  .edu-main strong {
    font-weight: 700;
    color: #000;
  }

  /* === EDUCATION === */
  .edu-item { margin-bottom: 2px; }

  .edu-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .edu-main {
    font-size: 10.5pt;
    color: #000;
  }

  .edu-school { font-weight: 400; }
  .edu-degree { font-weight: 700; font-style: normal; }
  .edu-honors {
    font-size: 10pt;
    font-style: italic;
    color: #000;
  }

  .edu-year {
    font-size: 10.5pt;
    font-weight: 400;
    color: #000;
    white-space: nowrap;
    text-align: right;
  }

  /* One-line education row (used for McKinsey Forward) */
  .edu-oneline {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-size: 10.5pt;
    margin-bottom: 2px;
  }

  .edu-oneline .right {
    font-weight: 400;
    white-space: nowrap;
    text-align: right;
  }

  /* === PROJECTS === */
  .projects-list {
    list-style-type: disc;
    list-style-position: outside;
    padding-left: 16px;
  }

  .projects-list li {
    display: list-item;
    list-style-type: disc;
    font-size: 10.5pt;
    line-height: 1.22;
    color: #000;
    margin-bottom: 0;
  }

  /* === SKILLS === */
  .skills-list {
    font-size: 10pt;
    line-height: 1.25;
    color: #000;
  }

  .skill-line { margin-bottom: 0; }

  .skill-category {
    font-weight: 600;
    color: #000;
  }

  /* Links must never break across lines */
  a { color: #000; white-space: nowrap; }

  /* === PAGE BREAK CONTROL === */
  .avoid-break,
  .job,
  .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- 1. HEADER (centered) -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      <span class="contact-sep">|</span>
      <span>{{PHONE}}</span>
      <span class="contact-sep">|</span>
      <a href="{{LINKEDIN_URL}}">linkedin.com/in/shivamsharma-ai</a>
      <span class="contact-sep">|</span>
      <a href="{{PORTFOLIO_URL}}">shivam.website</a>
    </div>
  </div>

  <!-- 2. SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">Summary</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- 3. PROFESSIONAL EXPERIENCE -->
  <div class="section">
    <div class="section-title">Professional Experience</div>
    {{EXPERIENCE}}
  </div>

  <!-- 4. EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">Education</div>
    {{EDUCATION}}
  </div>

  <!-- 5. PROJECTS -->
  <div class="section avoid-break">
    <div class="section-title">Projects</div>
    {{PROJECTS}}
  </div>

  <!-- 6. SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">Skills</div>
    <div class="skills-list">{{SKILLS}}</div>
  </div>

</div>
</body>
</html>
