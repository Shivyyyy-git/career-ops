<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} - Resume</title>
<style>
  /*
   * ============================================================
   *  SHIVAM SHARMA - ONE-PAGE RESUME TEMPLATE (v8.1)
   * ============================================================
   *  HEADER (centered):
   *    - Name "SHIVAM SHARMA" all caps, 20pt, weight 700, letter-spacing 0.04em
   *    - Contact line centered with pipe separators:
   *        email | phone | linkedin.com/in/shivamsharma-ai | shivam.website
   *    - NO "Open to relocation" (moved to cover letter)
   *    - NO GitHub link (cover letter only)
   *
   *  SECTIONS (fixed order):
   *    1. SUMMARY
   *    2. PROFESSIONAL EXPERIENCE (4 roles)
   *    3. EDUCATION (3 entries; McKinsey on one line)
   *    4. PROJECTS (2 one-line entries, no dates/locations)
   *    5. SKILLS (3 categories)
   *
   *  FORMATTING RULES:
   *    - Pure black (#000) on white only.
   *    - Font: Inter or IBM Plex Sans (ATS-safe).
   *    - Body 10.5pt, role titles 11pt bold, section headers 11pt uppercase bold (0.06em tracking).
   *    - Section headers: full-width 1px solid #000 bottom border.
   *    - Metrics bold weight 600 (subtle, professional - NOT 700).
   *    - Bullets: disc markers, 16px left padding.
   *    - NEVER use em-dash (-) in content. Use hyphen, comma, semicolon, colon instead.
   *    - Date format: "January 2026 - Present" (full month names, hyphen-space).
   *    - Role block layout (two-line header):
   *        Line 1: role-title (bold, left)     date (right-aligned)
   *        Line 2: company-name (italic, left) location (italic, right-aligned)
   *    - ONE PAGE HARD LIMIT. On overflow, apply role-class tailoring from modes/pdf.md:
   *        * technical/embedded roles: drop ESC bullet #4 (mentor) first
   *        * leadership roles: drop ESC bullet #3 (17 admin APIs) first, keep mentor
   *        * consulting firms: drop ESC bullet #2 (n8n) first, keep mentor
   *
   *  COVER LETTER (separate template):
   *    Closing includes 3 proof links (live demo, walkthrough, portfolio).
   *    References "HometownHUB" as the public-facing brand for ESC work.
   * ============================================================
   */

  @page {
    size: Letter;
    margin: 0.4in;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body {
    font-family: 'Inter', 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
    font-size: 10.5pt;
    line-height: 1.22;
    color: #000;
    background: #fff;
  }

  .page {
    width: 100%;
    max-width: {{PAGE_WIDTH}};
    margin: 0 auto;
    padding: 0;
    /* Hard one-page clip: Letter 11in - 0.4in x 2 margins = 10.2in */
    max-height: 10.2in;
    overflow: hidden;
  }

  /* === HEADER (centered) === */
  .header {
    text-align: center;
    margin-bottom: 4px;
  }

  .header h1 {
    font-size: 20pt;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    line-height: 1.15;
    margin-bottom: 4px;
    color: #000;
  }

  .contact-row {
    font-size: 10.5pt;
    line-height: 1.3;
    color: #000;
  }

  .contact-row a {
    color: #000;
    text-decoration: none;
  }

  .contact-sep {
    padding: 0 6px;
  }

  /* === SECTION HEADERS === */
  .section { margin-top: 1px; }

  .section-title {
    font-size: 11pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #000;
    border-bottom: 1px solid #000;
    padding-bottom: 1px;
    margin-bottom: 2px;
  }

  /* === SUMMARY === */
  .summary-text {
    font-size: 10.5pt;
    line-height: 1.25;
    color: #000;
  }

  /* === EXPERIENCE (two-line role header) === */
  .job { margin-bottom: 2px; }

  .role-header,
  .company-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .role-header { margin-bottom: 0; }
  .company-header { margin-bottom: 1px; }

  .role-title {
    font-size: 11pt;
    font-weight: 700;
    color: #000;
  }

  .company-name {
    font-size: 10.5pt;
    font-style: italic;
    font-weight: 400;
    color: #000;
  }

  .job-period {
    font-size: 10.5pt;
    font-weight: 400;
    color: #000;
    white-space: nowrap;
    text-align: right;
  }

  .job-location {
    font-size: 10.5pt;
    font-style: italic;
    color: #000;
    white-space: nowrap;
    text-align: right;
  }

  .job ul {
    list-style-type: disc;
    list-style-position: outside;
    padding-left: 16px;
    margin-top: 1px;
  }

  .job li {
    display: list-item;
    list-style-type: disc;
    font-size: 10.5pt;
    line-height: 1.22;
    color: #000;
    margin-bottom: 0;
  }

  /* Metrics - weight 600 per spec (subtle, professional) */
  .job li strong,
  .job li b,
  .job li .metric,
  .metric,
  .summary-text strong,
  .projects-list strong,
  .edu-main strong {
    font-weight: 600;
    color: #000;
  }

  /* === EDUCATION === */
  .edu-item { margin-bottom: 2px; }

  .edu-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }

  .edu-main {
    font-size: 10.5pt;
    color: #000;
  }

  .edu-school { font-weight: 400; }
  .edu-degree { font-weight: 700; font-style: normal; }
  .edu-honors {
    font-size: 10pt;
    font-style: italic;
    color: #000;
  }

  .edu-year {
    font-size: 10.5pt;
    font-weight: 400;
    color: #000;
    white-space: nowrap;
    text-align: right;
  }

  /* One-line education row (used for McKinsey Forward) */
  .edu-oneline {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    font-size: 10.5pt;
    margin-bottom: 2px;
  }

  .edu-oneline .right {
    font-weight: 400;
    white-space: nowrap;
    text-align: right;
  }

  /* === PROJECTS === */
  .projects-list {
    list-style-type: disc;
    list-style-position: outside;
    padding-left: 16px;
  }

  .projects-list li {
    display: list-item;
    list-style-type: disc;
    font-size: 10.5pt;
    line-height: 1.22;
    color: #000;
    margin-bottom: 0;
  }

  /* === SKILLS === */
  .skills-list {
    font-size: 10pt;
    line-height: 1.25;
    color: #000;
  }

  .skill-line { margin-bottom: 0; }

  .skill-category {
    font-weight: 600;
    color: #000;
  }

  /* Links must never break across lines */
  a { color: #000; white-space: nowrap; }

  /* === PAGE BREAK CONTROL === */
  .avoid-break,
  .job,
  .edu-item {
    break-inside: avoid;
    page-break-inside: avoid;
  }

  @media print {
    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .page { padding: 0; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- 1. HEADER (centered) -->
  <div class="header avoid-break">
    <h1>{{NAME}}</h1>
    <div class="contact-row">
      <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      <span class="contact-sep">|</span>
      <span>{{PHONE}}</span>
      <span class="contact-sep">|</span>
      <a href="{{LINKEDIN_URL}}">linkedin.com/in/shivamsharma-ai</a>
      <span class="contact-sep">|</span>
      <a href="{{PORTFOLIO_URL}}">shivam.website</a>
    </div>
  </div>

  <!-- 2. SUMMARY -->
  <div class="section avoid-break">
    <div class="section-title">Summary</div>
    <div class="summary-text">{{SUMMARY_TEXT}}</div>
  </div>

  <!-- 3. PROFESSIONAL EXPERIENCE -->
  <div class="section">
    <div class="section-title">Professional Experience</div>
    {{EXPERIENCE}}
  </div>

  <!-- 4. EDUCATION -->
  <div class="section avoid-break">
    <div class="section-title">Education</div>
    {{EDUCATION}}
  </div>

  <!-- 5. PROJECTS -->
  <div class="section avoid-break">
    <div class="section-title">Projects</div>
    {{PROJECTS}}
  </div>

  <!-- 6. SKILLS -->
  <div class="section avoid-break">
    <div class="section-title">Skills</div>
    <div class="skills-list">{{SKILLS}}</div>
  </div>

</div>
</body>
</html>
