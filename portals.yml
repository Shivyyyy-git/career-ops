# Portal Scanner Configuration — Shivam Sharma
# US-focused AI Product Manager target list
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# Geography: United States only (remote-US and hybrid-US both OK)

# -- Title filter --
title_filter:
  positive:
    - "Product Manager"
    - "Technical PM"
    - "Technical Product Manager"
    - "AI"
    - "ML"
    - "LLM"
    - "GenAI"
    - "Generative AI"
    - "Agentic"
    - "Agent"
    - "NLP"
    - "LLMOps"
    - "MLOps"
    - "Platform PM"
    - "Staff PM"
    - "Group PM"
    - "Principal PM"
  negative:
    - "Junior"
    - "Intern"
    - "Machine Learning Engineer"
    - "Marketing Manager"
    - "Project Manager"
    - "Program Manager"
    - "Community Manager"
    - "Customer Success"
    - "Sales"
    - "Recruiter"
    - "Designer"
    - "iOS"
    - "Android"
    - "Blockchain"
    - "Web3"
    - "Crypto"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"
    - "Group"

# -- Search queries --
# Each query triggers a WebSearch. Focused on AI PM roles, US geography.

search_queries:

  # -- Greenhouse --
  - name: Greenhouse — AI Product Manager
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Product Manager" United States OR remote'
    enabled: true

  - name: Greenhouse — Technical PM AI
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Technical Product Manager" AI OR ML OR LLM United States OR remote'
    enabled: true

  - name: Greenhouse — AI/ML PM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI/ML Product Manager" OR "ML Product Manager" United States OR remote'
    enabled: true

  - name: Greenhouse — PM LLM
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Manager" LLM OR "large language model" OR GenAI United States OR remote'
    enabled: true

  - name: Greenhouse — Senior/Staff PM AI
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Product Manager" OR "Staff Product Manager" AI OR ML United States OR remote'
    enabled: true

  # -- Ashby --
  - name: Ashby — AI Product Manager
    query: 'site:jobs.ashbyhq.com "AI Product Manager" OR "Product Manager AI" United States OR remote'
    enabled: true

  - name: Ashby — Technical PM AI
    query: 'site:jobs.ashbyhq.com "Technical Product Manager" AI OR ML OR LLM United States OR remote'
    enabled: true

  - name: Ashby — Senior/Staff PM AI
    query: 'site:jobs.ashbyhq.com "Senior Product Manager" OR "Staff Product Manager" AI OR ML OR Agentic OR GenAI'
    enabled: true

  - name: Ashby — PM Agentic
    query: 'site:jobs.ashbyhq.com "Product Manager" Agentic OR "AI Agent" OR orchestration OR workflow'
    enabled: true

  # -- Lever --
  - name: Lever — AI Product Manager
    query: 'site:jobs.lever.co "AI Product Manager" OR "Product Manager" AI OR ML United States OR remote'
    enabled: true

  - name: Lever — Senior PM AI
    query: 'site:jobs.lever.co "Senior Product Manager" OR "Staff Product Manager" AI OR ML OR LLM OR GenAI'
    enabled: true

  # -- Workable --
  - name: Workable — AI PM
    query: 'site:apply.workable.com "Product Manager" AI OR ML OR LLM United States OR remote'
    enabled: true

  # -- General job boards --
  - name: LinkedIn — AI PM
    query: 'site:linkedin.com/jobs "AI Product Manager" OR "Technical Product Manager AI" OR "ML Product Manager" United States remote'
    enabled: true

  - name: YC Jobs — AI PM
    query: 'site:workatastartup.com "Product Manager" AI OR ML OR LLM OR Agentic OR GenAI remote'
    enabled: true

  - name: ai-jobs.net — AI PM
    query: 'site:ai-jobs.net "Product Manager" AI OR ML OR LLM remote United States'
    enabled: true

  - name: Wellfound — AI PM
    query: 'site:wellfound.com "Product Manager" AI OR ML OR GenAI OR Agentic United States'
    enabled: true

  # -- Consulting firms & adjacent roles --
  - name: Consulting — Solutions Consultant AI
    query: '"Solutions Consultant AI" United States OR remote'
    enabled: true

  - name: Consulting — AI Implementation Manager
    query: '"AI Implementation Manager" United States OR remote'
    enabled: true

  - name: Consulting — Technical Program Manager
    query: '"Technical Program Manager" AI OR ML OR LLM OR GenAI United States OR remote'
    enabled: true

  - name: Consulting — Associate Product Manager
    query: '"Associate Product Manager" AI OR ML OR GenAI United States OR remote'
    enabled: true

  - name: Consulting — AI Strategy Consultant
    query: '"AI Strategy Consultant" United States OR remote'
    enabled: true

  - name: Consulting — Forward Deployed
    query: '"Forward Deployed" AI OR ML OR LLM United States OR remote'
    enabled: true

  - name: Consulting — Solutions Architect AI
    query: '"Solutions Architect" AI OR ML OR GenAI OR LLM United States OR remote'
    enabled: true

  - name: Consulting — AI Consultant
    query: '"AI Consultant" United States OR remote'
    enabled: true

  - name: Consulting — Management Consultant AI
    query: '"Management Consultant" AI OR "Data & AI" OR "Analytics" United States OR remote'
    enabled: true

